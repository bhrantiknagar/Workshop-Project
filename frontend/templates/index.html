<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPDF AI | Upload PDF</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/navbar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
</head>
<body>
    {% include "components/navbar.html" %}

    <main class="centered-upload-page">
        <section class="prompt-shell">
            <h1>What PDFs should we understand?</h1>
            <p>Upload up to 2 PDFs, then ask questions, create a summary, or find important details.</p>

            <form class="prompt-upload" id="uploadForm">
                <input id="pdfFile" name="pdf" type="file" accept="application/pdf" multiple>
                <label class="prompt-drop-zone" for="pdfFile" id="dropZone">
                    <span><i class="fa-solid fa-cloud-arrow-up"></i></span>
                    <strong>Upload PDFs</strong>
                    <small>Select 1 to 2 PDFs or drag them here</small>
                </label>
                <div class="progress-wrap" aria-label="Upload progress">
                    <span id="progressLabel">Waiting for PDF</span>
                    <div class="progress-track">
                        <div class="progress-bar" id="uploadProgress"></div>
                    </div>
                </div>
            </form>

            <div class="prompt-file-list" id="uploadedFileList" hidden></div>

            <div class="prompt-examples" aria-label="Example questions">
                <button type="button">Summarize these PDFs</button>
                <button type="button">Find key points</button>
                <button type="button">Explain a topic</button>
                <button type="button">Create notes</button>
            </div>

            <section class="llm-test-panel" aria-label="PDF chat panel">
                <!-- Chat UI is replaced by chat.js on DOMContentLoaded -->
                <div>Loading chat...</div>
            </section>

        </section>
    </main>
    <div class="preview-modal" id="pdfPreviewModal" aria-hidden="true">
        <section class="preview-panel" role="dialog" aria-modal="true" aria-labelledby="previewTitle">
            <header>
                <div>
                    <span>PDF Preview</span>
                    <h2 id="previewTitle">Extracted text</h2>
                    <p id="previewMeta"></p>
                </div>
                <button type="button" class="preview-close" id="previewClose" aria-label="Close preview">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </header>
            <div class="preview-content" id="previewContent"></div>
        </section>
    </div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <footer class="mini-footer">
        <span>SmartPDF AI &bull; Flask &bull; Groq &bull; ChromaDB</span>
        <span>&copy; 2026</span>
    </footer>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/upload.js') }}"></script>
    <script>
      // Provide endpoint URL to external chat module
      window.pdfChatConfig = { askUrl: '{{ url_for('chat.ask_question') }}' };
    </script>
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
