<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SmartPDF AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/navbar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/sidebar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/upload.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">
</head>
<body class="dashboard-body" id="dashboard">
    {% include "components/navbar.html" %}
    <main class="centered-upload-page">
        <section class="prompt-shell">
            <h1>What PDF should we understand?</h1>
            <p>Upload a PDF, then ask questions, create a summary, or find important details.</p>

            <form class="prompt-upload" id="uploadForm">
                <input id="pdfFile" name="pdf" type="file" accept="application/pdf">
                <label class="prompt-drop-zone" for="pdfFile" id="dropZone">
                    <span><i class="fa-solid fa-cloud-arrow-up"></i></span>
                    <strong>Upload PDF</strong>
                    <small>Drag and drop or browse from your device</small>
                </label>
                <div class="progress-wrap" aria-label="Upload progress">
                    <span id="progressLabel">Waiting for PDF</span>
                    <div class="progress-track">
                        <div class="progress-bar" id="uploadProgress"></div>
                    </div>
                </div>
            </form>

            <article class="prompt-file-card" id="uploadedFileCard" hidden>
                <div>
                    <i class="fa-regular fa-file-pdf"></i>
                    <div>
                        <strong id="uploadedFilename">Document.pdf</strong>
                        <small id="uploadedMeta">Ready</small>
                    </div>
                </div>
                <button class="icon-button delete-file-button" type="button" id="deleteUploadedFile" aria-label="Remove uploaded file">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </article>

            <div class="prompt-examples" aria-label="Example questions">
                <button type="button">Summarize this PDF</button>
                <button type="button">Find key points</button>
                <button type="button">Explain a topic</button>
                <button type="button">Create notes</button>
            </div>

            <div class="prompt-meta" aria-live="polite">
                <span id="infoFilename">Not uploaded</span>
                <span id="infoPages">--</span>
                <span id="infoSize">--</span>
                <span id="infoDate">--</span>
                <span id="infoStatus">Idle</span>
                <span id="infoLastQuestion">--</span>
            </div>
        </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/sidebar.js') }}"></script>
    <script src="{{ url_for('static', filename='js/upload.js') }}"></script>
</body>
</html>
