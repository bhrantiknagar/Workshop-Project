<section class="panel chat-panel" id="chat-panel">
    <div class="panel-heading">
        <div>
            <span class="eyebrow">Assistant</span>
            <h2>Chat</h2>
        </div>
        <span class="badge"><i class="fa-solid fa-wand-magic-sparkles"></i> AI ready</span>
    </div>

    <div class="messages" id="messages">
        {% include "components/message.html" %}
    </div>

    <form class="chat-form" id="chatForm">
        <input id="questionInput" name="question" type="text" placeholder="Ask anything about your PDF..." autocomplete="off">
        <button class="button primary send-button" type="submit" aria-label="Send message">
            <i class="fa-solid fa-paper-plane"></i>
            Send
        </button>
    </form>
</section>
