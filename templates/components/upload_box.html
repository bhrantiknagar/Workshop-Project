<section class="panel upload-panel" id="upload-panel">
    <div class="panel-heading">
        <div>
            <span class="eyebrow">Document</span>
            <h2>Upload PDF</h2>
        </div>
        <span class="badge"><i class="fa-regular fa-file-pdf"></i> PDF only</span>
    </div>

    <form class="upload-box" id="uploadForm">
        <input id="pdfFile" name="pdf" type="file" accept="application/pdf">
        <label class="drop-zone" for="pdfFile" id="dropZone">
            <span class="upload-icon"><i class="fa-solid fa-cloud-arrow-up"></i></span>
            <strong>Drag and drop your PDF here</strong>
            <small>or browse from your device</small>
            <span class="button secondary browse-button">Browse File</span>
        </label>
        <div class="progress-wrap" aria-label="Upload progress">
            <span id="progressLabel">Waiting for PDF</span>
            <div class="progress-track">
                <div class="progress-bar" id="uploadProgress"></div>
            </div>
        </div>
    </form>

    <article class="pdf-info-card" id="pdfInfo">
        <div class="info-row">
            <span>Filename</span>
            <strong id="infoFilename">Not uploaded</strong>
        </div>
        <div class="info-row">
            <span>Pages</span>
            <strong id="infoPages">--</strong>
        </div>
        <div class="info-row">
            <span>File Size</span>
            <strong id="infoSize">--</strong>
        </div>
        <div class="info-row">
            <span>Status</span>
            <strong class="status-ready" id="infoStatus">Idle</strong>
        </div>
    </article>
</section>
