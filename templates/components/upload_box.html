<section class="panel upload-panel" id="upload-panel">
    <div class="panel-heading">
        <div>
            <span class="eyebrow">Document</span>
            <h2>Upload PDF</h2>
        </div>
        <span class="badge"><i class="fa-regular fa-file-pdf"></i> PDF</span>
    </div>

    <form class="upload-box" id="uploadForm">
        <input id="pdfFile" name="pdf" type="file" accept="application/pdf">
        <label class="drop-zone" for="pdfFile" id="dropZone">
            <span class="upload-icon"><i class="fa-solid fa-cloud-arrow-up"></i></span>
            <strong>Drag and drop your PDF here</strong>
            <small>Supported: PDF · DOCX coming soon</small>
            <span class="button secondary browse-button">Browse File</span>
        </label>
        <div class="progress-wrap" aria-label="Upload progress">
            <span id="progressLabel">Waiting for PDF</span>
            <div class="progress-track">
                <div class="progress-bar" id="uploadProgress"></div>
            </div>
        </div>
    </form>

    <article class="uploaded-file-card" id="uploadedFileCard" hidden>
        <div>
            <i class="fa-regular fa-file-pdf"></i>
            <div>
                <strong id="uploadedFilename">Document.pdf</strong>
                <small id="uploadedMeta">Ready</small>
            </div>
        </div>
        <button class="icon-button delete-file-button" type="button" id="deleteUploadedFile" aria-label="Remove uploaded file">
            <i class="fa-solid fa-trash"></i>
        </button>
    </article>

    <article class="pdf-info-card document-card" id="pdfInfo">
        <h3>Document Details</h3>
        <div class="info-row">
            <span>Filename</span>
            <strong id="infoFilename">Not uploaded</strong>
        </div>
        <div class="info-row">
            <span>Pages</span>
            <strong id="infoPages">--</strong>
        </div>
        <div class="info-row">
            <span>File Size</span>
            <strong id="infoSize">--</strong>
        </div>
        <div class="info-row">
            <span>Upload Time</span>
            <strong id="infoDate">--</strong>
        </div>
        <div class="info-row">
            <span>Status</span>
            <strong class="status-ready" id="infoStatus">Idle</strong>
        </div>
        <div class="info-row">
            <span>Last Question</span>
            <strong id="infoLastQuestion">--</strong>
        </div>
    </article>
</section>
